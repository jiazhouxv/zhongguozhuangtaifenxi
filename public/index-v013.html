<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>中国状态分析 Dashboard V0.1.3</title><style>body{margin:0;background:radial-gradient(circle at top left,rgba(56,189,248,.16),transparent 32%),#0f172a;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.6}main,header{max-width:1280px;margin:auto;padding:22px}a{color:#38bdf8}.muted{color:#94a3b8}.grid{display:grid;gap:14px}.top{grid-template-columns:1fr 1.25fr}.cards{grid-template-columns:repeat(3,1fr)}.sources{grid-template-columns:repeat(2,1fr)}.card{background:linear-gradient(180deg,rgba(31,41,55,.94),rgba(17,24,39,.94));border:1px solid rgba(148,163,184,.24);border-radius:18px;padding:16px;box-shadow:0 14px 35px rgba(0,0,0,.25)}.row{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}.badge,.chip{display:inline-block;border:1px solid rgba(148,163,184,.25);border-radius:999px;padding:4px 9px;margin:3px;color:#cbd5e1;font-size:12px}.chip{cursor:pointer;background:rgba(15,23,42,.62)}.chip.active{border-color:#38bdf8;color:#e0f2fe}.circle{width:168px;height:168px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(#fb923c calc(var(--score)*1%),rgba(148,163,184,.16) 0);position:relative}.circle:after{content:"";position:absolute;inset:13px;background:#111827;border-radius:50%;border:1px solid rgba(148,163,184,.22)}.circle strong{position:relative;z-index:1;font-size:48px}.risk-low{color:#22c55e}.risk-mid{color:#facc15}.risk-high{color:#fb923c}.risk-severe{color:#f87171}.bar{height:9px;border-radius:999px;background:rgba(148,163,184,.18);overflow:hidden}.bar span{display:block;height:100%;border-radius:999px}.bar-low{background:#22c55e}.bar-mid{background:#facc15}.bar-high{background:#fb923c}.bar-severe{background:#f87171}button,select{background:rgba(56,189,248,.12);color:#e5e7eb;border:1px solid rgba(56,189,248,.3);border-radius:10px;padding:7px 10px;margin:4px}select option{background:#111827}.scenarioBtn{font-size:18px;min-width:42px}.presetTip{font-size:12px;color:#94a3b8;margin-top:8px}label{font-size:13px;color:#94a3b8;margin-right:8px}input[type=range]{width:100%}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid rgba(148,163,184,.2);padding:8px;text-align:left;vertical-align:top}td{color:#94a3b8}.small{font-size:12px}@media(max-width:950px){.top,.cards,.sources{grid-template-columns:1fr}.row{flex-direction:column}.circle{width:150px;height:150px}}</style></head><body><header><h1>中国状态分析 Dashboard</h1><p class="muted">V0.1.3：新增企业/店铺/工程项目监测，恢复圆环评分，场景切换联动下方模块。</p><span class="badge" id="asOfBadge">分析截至：--</span><span class="badge">中国当前 ↔ 历史事件回溯</span><span class="badge">同址换店率 / 新设注销 / 发标量</span></header><main><section class="grid top"><div class="card"><div class="row"><button class="scenarioBtn" onclick="prevScenario()">←</button><div><h2 id="scenarioTitle">--</h2><p class="muted" id="scenarioMeta">--</p><div id="checkpointBox"></div></div><button class="scenarioBtn" onclick="nextScenario()">→</button></div><div class="row" style="align-items:center;margin-top:12px"><div class="circle" id="scoreCircle" style="--score:0"><strong id="totalScore">--</strong></div><div><h2 id="riskBand">--</h2><p class="muted" id="scoreMeta"></p><p class="muted" id="scenarioSignals"></p></div></div></div><div class="card"><h2>权重预设</h2><div id="presetChips"></div><p class="presetTip" id="presetBasis">鼠标停在预设上可看说明，点击后切换权重。</p><p class="muted small">权重预设已缩成芯片，不再占大面积。手动拖动权重后自动进入“自定义”。</p></div></section><h2>数据源控制台</h2><p class="muted">切换到日本 1990 场景后，下方风险模块会显示历史节点分数；数据源控制台仍控制参与数据源和权重，用于模拟“同一套模型在历史事件中的表现”。</p><div><button onclick="enableAll()">全部启用</button><button onclick="disableOfficial()">禁用官方数据试算</button><button onclick="resetAll()">恢复默认</button></div><section id="sourceList" class="grid sources"></section><h2>风险模块</h2><section id="moduleList" class="grid cards"></section><h2>历史危机相似度</h2><section id="caseList" class="grid sources"></section><h2>数据源总表</h2><section class="card"><table id="sourceTable"></table></section></main><script>const P={sources:'./data/sources.json',risks:'./data/risk_scores.json',cases:'./data/historical_cases.json',presets:'./data/weight_presets.json',replay:'./data/historical_replay.json',entity:'./data/entity_economy_sources.json'};let S=[],R,C=[],W=[],H,E,D=[],preset='balanced_research',scenario=0,ck='event';async function j(p){let r=await fetch(p,{cache:'no-store'});if(!r.ok)throw Error(p);return r.json()}function cls(x){return x>=75?'risk-severe':x>=50?'risk-high':x>=25?'risk-mid':'risk-low'}function bcls(x){return x>=75?'bar-severe':x>=50?'bar-high':x>=25?'bar-mid':'bar-low'}function band(x){return x>=75?'高风险':x>=50?'中高风险':x>=25?'中低风险':'低风险'}function src(id){return S.find(x=>x.source_id===id)}function moduleName(id){let m=allModules().find(x=>x.module_id===id);return m?m.name:id}function allModules(){return [...R.modules,...E.modules]}function allModuleWeight(id){let m=allModules().find(x=>x.module_id===id);return m?m.module_weight:0.05}function activeSourceForSignal(g){let s=src(g.source_id);return s&&s.enabled&&s.included_in_score}function modScore(m){let a=0,t=0;m.signals.forEach(g=>{let s=src(g.source_id);if(!s||!s.enabled||!s.included_in_score)return;let w=(g.weight||0)*(s.weight||0)*(s.reliability||1);a+=(g.score||0)*w;t+=w});return t?Math.round(a/t):0}function currentScores(){let o={};allModules().forEach(m=>o[m.module_id]=modScore(m));return o}function replayPoint(){let ev=H.events[0];return ev.timeline.find(x=>x.checkpoint===ck)||ev.timeline.find(x=>x.checkpoint==='event')||ev.timeline[0]}function scenarioScores(){if(scenario===0)return currentScores();return replayPoint().scores}function total(){let scores=scenarioScores(),a=0,t=0;Object.entries(scores).forEach(([k,v])=>{let w=allModuleWeight(k);a+=v*w;t+=w});return t?Math.round(a/t):0}function applyPreset(id){let p=W.find(x=>x.preset_id===id);if(!p)return;preset=id;S.forEach(s=>{if(p.weights[s.source_id]!=null)s.weight=p.weights[s.source_id]});render()}function prevScenario(){scenario=(scenario+1)%2;render()}function nextScenario(){scenario=(scenario+1)%2;render()}function renderTop(){let T=total(),scores=scenarioScores();document.getElementById('totalScore').textContent=T;document.getElementById('scoreCircle').style.setProperty('--score',T);document.getElementById('totalScore').className=cls(T);document.getElementById('riskBand').textContent=band(T);document.getElementById('riskBand').className=cls(T);if(scenario===0){document.getElementById('scenarioTitle').textContent='中国当前状态';document.getElementById('scenarioMeta').textContent='总风险评分分析截至：'+R.as_of;document.getElementById('asOfBadge').textContent='分析截至：'+R.as_of;document.getElementById('checkpointBox').innerHTML='';document.getElementById('scenarioSignals').textContent='主页面展示中国当前样例分数。'}else{let ev=H.events[0],pt=replayPoint();document.getElementById('scenarioTitle').textContent=ev.name;document.getElementById('scenarioMeta').textContent='事件锚点：'+ev.event_date+'｜当前节点：'+pt.label+'（'+pt.date+'）｜状态：'+ev.data_status;document.getElementById('asOfBadge').textContent='历史回溯：'+pt.date;document.getElementById('checkpointBox').innerHTML='<select onchange="ck=this.value;render()">'+ev.timeline.map(x=>'<option value="'+x.checkpoint+'" '+(x.checkpoint===pt.checkpoint?'selected':'')+'>'+x.label+'</option>').join('')+'</select>';document.getElementById('scenarioSignals').textContent=pt.signals.join(' / ')} }function renderPresets(){let p=W.find(x=>x.preset_id===preset);document.getElementById('presetBasis').textContent=p?p.name+'：'+p.basis:'自定义权重：你已手动修改数据源。';document.getElementById('presetChips').innerHTML=W.map(x=>'<span class="chip '+(x.preset_id===preset?'active':'')+'" title="'+x.description+'｜依据：'+x.basis+'" onclick="applyPreset(\''+x.preset_id+'\')">'+x.name+'</span>').join('')}function renderSources(){document.getElementById('sourceList').innerHTML=S.filter(x=>x.visible).map(x=>'<div class="card"><div class="row"><strong>'+x.name+'</strong><span class="badge">'+x.category+'</span></div><p class="muted">'+x.description+'</p><p class="muted small">数据截至：'+(x.data_until||'未标记')+'｜'+(x.data_until_label||'')+'</p><p><a href="'+x.source_page+'" target="_blank">'+(x.source_label||'查看来源')+'</a></p><label><input type="checkbox" onchange="chg(\''+x.source_id+'\',\'enabled\',this.checked)" '+(x.enabled?'checked':'')+'> 启用</label><label><input type="checkbox" onchange="chg(\''+x.source_id+'\',\'visible\',this.checked)" '+(x.visible?'checked':'')+'> 显示</label><label><input type="checkbox" onchange="chg(\''+x.source_id+'\',\'included\',this.checked)" '+(x.included_in_score?'checked':'')+'> 纳入评分</label><p><input type="range" min="0" max="1" step="0.05" value="'+x.weight+'" oninput="chg(\''+x.source_id+'\',\'weight\',this.value)"></p><p class="muted small">可信度 '+x.reliability+'｜偏差风险：'+x.bias_risk+'</p></div>').join('')}function renderModules(){let scores=scenarioScores();document.getElementById('moduleList').innerHTML=Object.entries(scores).map(([k,v])=>'<div class="card"><div class="row"><strong>'+moduleName(k)+'</strong><span class="'+cls(v)+'">'+v+'</span></div><div class="bar"><span class="'+bcls(v)+'" style="width:'+v+'%"></span></div><p class="muted small">'+(scenario===0?'中国当前样例分数，受数据源和权重影响。':'历史回溯节点分数，当前为样例框架，待真实历史时间序列验证。')+'</p></div>').join('')}function renderCases(){document.getElementById('caseList').innerHTML=C.sort((a,b)=>b.similarity_score-a.similarity_score).map(c=>'<div class="card"><div class="row"><strong>'+c.name+'</strong><span class="'+cls(c.similarity_score)+'">'+c.similarity_score+'</span></div><div class="bar"><span class="'+bcls(c.similarity_score)+'" style="width:'+c.similarity_score+'%"></span></div><p class="muted">'+c.summary+'</p></div>').join('')}function renderTable(){document.getElementById('sourceTable').innerHTML='<thead><tr><th>数据源</th><th>状态</th><th>权重</th><th>数据截至</th><th>来源</th></tr></thead><tbody>'+S.map(x=>'<tr><td>'+x.name+'<br><span class="muted">'+x.source_id+'</span></td><td>'+(x.enabled?'启用':'禁用')+' / '+(x.visible?'显示':'隐藏')+' / '+(x.included_in_score?'纳入':'不纳入')+'</td><td>'+Number(x.weight).toFixed(2)+'</td><td>'+(x.data_until||'未标记')+'<br><span class="muted">'+(x.data_until_label||'')+'</span></td><td><a href="'+x.source_page+'" target="_blank">来源说明</a></td></tr>').join('')+'</tbody>'}function chg(id,k,v){let s=src(id);if(!s)return;if(k==='enabled')s.enabled=v;if(k==='visible')s.visible=v;if(k==='included')s.included_in_score=v;if(k==='weight'){s.weight=Number(v);preset='custom'}render()}function enableAll(){S.forEach(s=>{s.enabled=true;s.visible=true;s.included_in_score=s.category!=='historical_cases'});preset='custom';render()}function disableOfficial(){let s=src('CN_OFFICIAL_MACRO');if(s){s.enabled=false;s.included_in_score=false}preset='custom';render()}function resetAll(){S=JSON.parse(JSON.stringify(D));scenario=0;ck='event';preset='balanced_research';applyPreset(preset)}function render(){renderTop();renderPresets();renderSources();renderModules();renderCases();renderTable()}(async()=>{let baseSources;[baseSources,R,C,W,H,E]=await Promise.all([j(P.sources),j(P.risks),j(P.cases),j(P.presets),j(P.replay),j(P.entity)]);S=[...baseSources,...E.sources];D=JSON.parse(JSON.stringify(S));applyPreset(preset)})().catch(e=>{document.body.innerHTML='<main><h1>页面加载失败</h1><pre>'+e.message+'</pre></main>'})</script></body></html>
