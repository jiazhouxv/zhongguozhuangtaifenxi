<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>债务与信用市场｜来源说明</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#0f172a;color:#e5e7eb;line-height:1.7;margin:0;padding:28px}main{max-width:980px;margin:auto}a{color:#38bdf8}.card{background:#111827;border:1px solid rgba(148,163,184,.25);border-radius:16px;padding:18px;margin:14px 0}h1,h2{margin-top:0}.muted{color:#94a3b8}li{margin:6px 0}</style></head><body><main><p><a href="../index.html">← 返回 Dashboard</a></p><h1>债务与信用市场｜来源说明</h1><div class="card"><h2>主要公开来源</h2><ul><li><a href="https://www.pbc.gov.cn/" target="_blank" rel="noopener">中国人民银行</a>：社融、贷款、货币、利率。</li><li><a href="https://www.chinabond.com.cn/" target="_blank" rel="noopener">中国债券信息网</a>：债券市场、收益率和估值。</li><li><a href="https://www.nafmii.org.cn/" target="_blank" rel="noopener">交易商协会</a>：债务融资工具信息。</li><li><a href="https://www.sse.com.cn/" target="_blank" rel="noopener">上交所</a>、<a href="https://www.szse.cn/" target="_blank" rel="noopener">深交所</a>：公司债、上市银行财报。</li><li>银行年报、债券募集说明书、评级报告：净息差、不良、拨备、城投敞口。</li></ul></div><div class="card"><h2>关键指标</h2><ul><li>社融结构、居民贷款、企业贷款。</li><li>城投债利差、地产债利差、违约和展期。</li><li>银行净息差、不良迁徙率、拨备覆盖率。</li><li>票据利率、信用利差和融资滚续能力。</li></ul></div></main></body></html>
